<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Petty Cash Voucher</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0f0f0; font-family:Arial,sans-serif; }
.screen-wrap { max-width:900px; margin:0 auto; padding:24px 16px 60px; }
h2 { font-size:20px; font-weight:700; color:#1a1a1a; margin-bottom:4px; }
.screen-sub { font-size:13px; color:#666; margin-bottom:20px; }
.form-card { background:#fff; border-radius:10px; padding:20px 24px; margin-bottom:20px; box-shadow:0 1px 4px rgba(0,0,0,.1); }
.form-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#555; margin-bottom:14px; }
.form-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.form-group { display:flex; flex-direction:column; gap:4px; flex:1; min-width:160px; }
.form-group label { font-size:12px; color:#666; font-weight:600; }
.form-group input { border:1px solid #ddd; border-radius:6px; padding:8px 10px; font-size:13px; outline:none; }
.form-group input:focus { border-color:#2563eb; }
.names-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.name-row { display:flex; gap:8px; align-items:center; }
.name-row input { flex:1; border:1px solid #ddd; border-radius:6px; padding:7px 10px; font-size:13px; outline:none; }
.name-row input:focus { border-color:#2563eb; }
.btn-remove { background:none; border:none; color:#e53e3e; font-size:20px; cursor:pointer; padding:0 4px; }
.btn { padding:9px 18px; border:none; border-radius:7px; font-size:13px; font-weight:700; cursor:pointer; }
.btn-add { background:#e8f5e9; color:#1b5e20; }
.btn-serial { background:#e3f2fd; color:#1565c0; }
.btn-serial.found { background:#e8f5e9; color:#1b5e20; }
.btn-generate { background:#1a1a2e; color:#fff; padding:11px 28px; font-size:14px; }
.btn-print { background:#2563eb; color:#fff; padding:11px 28px; font-size:14px; cursor:pointer; border:none; border-radius:7px; font-weight:700; }
.serial-status { font-size:12px; color:#666; margin-left:8px; }
.serial-status.ok { color:#1b5e20; font-weight:600; }
.serial-status.missing { color:#e53e3e; }
.rates-row { display:flex; gap:16px; flex-wrap:wrap; background:#f9f9f9; border-radius:8px; padding:12px 14px; font-size:13px; color:#444; }
.action-bar { display:flex; gap:10px; align-items:center; margin-top:16px; }
.voucher-preview { background:#fff; border-radius:10px; padding:20px 24px; box-shadow:0 1px 4px rgba(0,0,0,.1); margin-bottom:20px; }
.preview-title { font-size:13px; font-weight:700; color:#555; margin-bottom:14px; display:flex; align-items:center; gap:12px; }
.print-page { width:100%; max-width:680px; margin:0 auto; font-family:Arial,sans-serif; font-size:10pt; }
.voucher { border:1px solid #000; margin-bottom:14px; width:100%; border-collapse:collapse; }
.voucher td, .voucher th { border:1px solid #000; padding:3px 6px; vertical-align:top; }
.voucher-title { text-align:center; font-weight:bold; font-size:11pt; padding:5px !important; }
.voucher-date { text-align:center; font-style:italic; padding:3px 6px !important; }
.voucher-date span { font-weight:bold; text-decoration:underline; }
.voucher-to { padding:3px 6px !important; font-weight:bold; }
.col-particulars { width:70%; }
.col-amount { width:30%; text-align:center; }
.header-row th { text-align:center; font-weight:bold; background:#fff; padding:4px 6px !important; }
.content-cell { padding:4px 6px !important; vertical-align:top; }
.type-label { text-align:center; font-weight:bold; margin-bottom:2px; }
.names-block { padding-left:16px; line-height:1.8; }
.serial-text { color:red; font-size:9pt; }
.amounts-cell { text-align:center; vertical-align:top; padding:4px 6px !important; line-height:1.8; white-space:nowrap; }
.total-label { text-align:right; font-weight:bold; font-style:italic; padding:3px 6px !important; border-top:1px solid #000 !important; }
.total-amount { text-align:center; font-weight:bold; border-top:1px solid #000 !important; padding:3px 6px !important; }
.received-label { font-style:italic; padding:4px 6px !important; }
@media print {
  body { background:#fff; }
  .screen-only { display:none !important; }
  .screen-wrap { padding:0; max-width:100%; }
  .voucher-preview { box-shadow:none; padding:0; border-radius:0; margin:0; }
  .preview-title { display:none; }
  .print-page { max-width:100%; }
  @page { margin:10mm; size:A4 portrait; }
}
</style>
</head>
<body>
<div class="screen-wrap">

  <div class="screen-only">
    <h2>💵 Petty Cash Voucher</h2>
    <p class="screen-sub">Fill in details · load serials from scanner · generate and print</p>

    <div class="form-card">
      <div class="form-title">Voucher Details</div>
      <div class="form-row">
        <div class="form-group">
          <label>TO (Payee)</label>
          <input type="text" id="payee" value="ARDCORP C/O CRISHA">
        </div>
        <div class="form-group" style="max-width:200px;">
          <label>Date</label>
          <input type="date" id="voucherDate">
        </div>
      </div>

      <div class="form-title" style="margin-top:14px;">Names</div>
      <div class="names-list" id="namesList">
        <div class="name-row">
          <input type="text" placeholder="Full name e.g. RITCHEL MAE ATON" class="name-input">
          <button class="btn-remove" type="button">x</button>
        </div>
      </div>
      <button class="btn btn-add" type="button" id="btnAddName">+ Add Name</button>

      <div class="form-title" style="margin-top:16px;">Fixed Rates</div>
      <div class="rates-row">
        <div>OEC Process: <strong>2,000.00</strong> / person</div>
        <div>Royalty Fee: <strong>6,500.00</strong> / person</div>
        <div>Insurance: <strong>$53.00</strong> / person</div>
      </div>

      <div class="form-title" style="margin-top:16px;">Serial Numbers (Insurance)</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="btn btn-serial" type="button" id="btnLoadSerial">Load from Scanner</button>
        <span class="serial-status" id="serialStatus">Not loaded</span>
      </div>
      <div id="serialPreview" style="margin-top:8px;font-size:12px;color:#555;font-family:monospace;background:#f5f5f5;padding:8px 10px;border-radius:6px;display:none;word-break:break-all;"></div>

      <div class="action-bar">
        <button class="btn btn-generate" type="button" id="btnGenerate">Generate Voucher</button>
      </div>
    </div>
  </div>

  <div class="voucher-preview" id="voucherPreview" style="display:none;">
    <div class="preview-title screen-only">
      Preview
      <button class="btn-print" type="button" id="btnPrint">Print / Save PDF</button>
    </div>
    <div class="print-page" id="printPage"></div>
  </div>

</div>
<script>
// Set today's date
(function() {
  var d   = new Date();
  var mm  = String(d.getMonth()+1).padStart(2,'0');
  var dd  = String(d.getDate()).padStart(2,'0');
  document.getElementById('voucherDate').value = d.getFullYear()+'-'+mm+'-'+dd;
})();

// Remove button on first row
document.querySelector('.btn-remove').addEventListener('click', function() {
  removeName(this);
});

// Button listeners
document.getElementById('btnAddName').addEventListener('click', addName);
document.getElementById('btnLoadSerial').addEventListener('click', loadSerial);
document.getElementById('btnGenerate').addEventListener('click', generateVoucher);
document.getElementById('btnPrint').addEventListener('click', function() { window.print(); });

function addName() {
  var list = document.getElementById('namesList');
  var row  = document.createElement('div');
  row.className = 'name-row';
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'Full name';
  inp.className = 'name-input';
  var btn = document.createElement('button');
  btn.className = 'btn-remove';
  btn.type = 'button';
  btn.textContent = 'x';
  btn.addEventListener('click', function() { removeName(btn); });
  row.appendChild(inp);
  row.appendChild(btn);
  list.appendChild(row);
  inp.focus();
}

function removeName(btn) {
  var list = document.getElementById('namesList');
  if (list.children.length > 1) btn.parentElement.remove();
}

function getNames() {
  return Array.from(document.querySelectorAll('.name-input'))
    .map(function(i) { return i.value.trim().toUpperCase(); })
    .filter(function(n) { return n !== ''; });
}

async function loadSerial() {
  var btn    = document.getElementById('btnLoadSerial');
  var status = document.getElementById('serialStatus');
  var prev   = document.getElementById('serialPreview');
  btn.textContent = 'Loading...';
  try {
    var res  = await fetch('/get-serial');
    var data = await res.json();
    if (data.found && data.serial) {
      window._serial      = data.serial;
      status.textContent  = 'Loaded!';
      status.className    = 'serial-status ok';
      btn.textContent     = 'Loaded';
      btn.className       = 'btn btn-serial found';
      prev.textContent    = data.serial;
      prev.style.display  = 'block';
    } else {
      window._serial     = '';
      status.textContent = 'No scan found - scan bills on phone first';
      status.className   = 'serial-status missing';
      btn.textContent    = 'Load from Scanner';
    }
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    btn.textContent    = 'Load from Scanner';
  }
}

function formatDate(s) {
  var p = s.split('-');
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function buildVoucher(type, payee, dateStr, names, serialStr) {
  var RATES  = { OEC:2000, ROYALTY:6500, INSURANCE:53 };
  var LABELS = { OEC:'OEC PROCESS', ROYALTY:'ROYALTY FEE', INSURANCE:'INSURANCE' };
  var rate   = RATES[type];
  var total  = rate * names.length;
  var cur    = type === 'INSURANCE' ? '$' : '';
  var amtCol = type === 'OEC' ? 'AMOUNT' : 'PARTICULARS';

  var nameLines = names.map(function(n,i){ return (i+1)+'. '+n; }).join('<br>');
  var serials   = '';
  if (type === 'INSURANCE' && serialStr) {
    serials = '<br><span class="serial-text">' +
      serialStr.split(' || ').map(function(s){ return s.trim(); }).join('<br>') +
      '</span>';
  }
  var amts = '&nbsp;<br>' + names.map(function(){ return cur+fmt(rate); }).join('<br>');

  return '<table class="voucher">' +
    '<tr><td colspan="2" class="voucher-title">PETTY CASH VOUCHER</td></tr>' +
    '<tr><td colspan="2" class="voucher-date"><em>DATE :</em> <span>'+formatDate(dateStr)+'</span></td></tr>' +
    '<tr><td colspan="2" class="voucher-to">TO: '+payee+'</td></tr>' +
    '<tr class="header-row"><th class="col-particulars">PARTICULARS</th><th class="col-amount">'+amtCol+'</th></tr>' +
    '<tr>' +
      '<td class="content-cell"><div class="type-label">'+LABELS[type]+'</div><div class="names-block">'+nameLines+serials+'</div></td>' +
      '<td class="amounts-cell">'+amts+'</td>' +
    '</tr>' +
    '<tr><td class="total-label">TOTAL PAYMENT</td><td class="total-amount">'+cur+fmt(total)+'</td></tr>' +
    '<tr><td colspan="2" class="received-label">Received Payment:</td></tr>' +
    '</table>';
}

function generateVoucher() {
  var names   = getNames();
  var payee   = document.getElementById('payee').value.trim() || 'ARDCORP C/O CRISHA';
  var dateStr = document.getElementById('voucherDate').value;
  var serial  = window._serial || '';

  if (!names.length)  { alert('Please enter at least one name.');   return; }
  if (!dateStr)        { alert('Please select a date.');             return; }
  if (!serial)         { alert('No serial numbers loaded!\nScan bills on phone first, then click Load from Scanner.'); return; }

  // Validate scanned bills total >= insurance total
  var insTotal   = names.length * 53;
  var billsTotal = 0;
  serial.split(' || ').forEach(function(part) {
    var t = part.trim();
    if (t.charAt(0) === '$') {
      var ci  = t.indexOf(' :');
      var val = parseFloat(ci > -1 ? t.slice(1,ci) : t.slice(1));
      if (!isNaN(val)) billsTotal += val;
    }
  });

  if (billsTotal < insTotal) {
    alert('AMOUNT MISMATCH!\n\nInsurance Total:     $' + insTotal.toFixed(2) +
          '\nScanned Bills Total: $' + billsTotal.toFixed(2) +
          '\n\nScanned bills must be >= Insurance Total.\nPlease scan correct bills and reload.');
    return;
  }

  document.getElementById('printPage').innerHTML =
    buildVoucher('OEC',       payee, dateStr, names, '') +
    buildVoucher('ROYALTY',   payee, dateStr, names, '') +
    buildVoucher('INSURANCE', payee, dateStr, names, serial);

  var preview = document.getElementById('voucherPreview');
  preview.style.display = 'block';
  preview.scrollIntoView({ behavior:'smooth' });
}
</script>
</body>
</html>
