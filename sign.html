<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Signature Pad</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0A0F0A; font-family:'Arial',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; gap:16px; }
h2 { color:#fff; font-size:18px; font-weight:700; }
.sub { color:#557755; font-size:12px; font-family:monospace; }
.canvas-wrap {
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  border:3px solid #00C853;
  width:100%;
  max-width:440px;
  position:relative;
}
canvas { display:block; width:100%; touch-action:none; cursor:crosshair; }
.sign-line {
  position:absolute; bottom:40px; left:20px; right:20px;
  height:1px; background:#ccc; pointer-events:none;
}
.sign-hint {
  position:absolute; bottom:14px; left:0; right:0;
  text-align:center; font-size:11px; color:#aaa; pointer-events:none;
}
.btns { display:flex; gap:10px; width:100%; max-width:440px; }
.btn {
  flex:1; padding:14px; border:none; border-radius:10px;
  font-size:15px; font-weight:700; cursor:pointer;
}
.btn-clear { background:#1E2E1E; color:#557755; border:1px solid #1E2E1E; }
.btn-send  { background:#00C853; color:#000; }
.btn-send:disabled { background:#1E3020; color:#3A5A3A; cursor:not-allowed; }
.status { font-size:13px; font-family:monospace; min-height:20px; }
.status.ok  { color:#00E676; }
.status.err { color:#FF5252; }
</style>
</head>
<body>
<h2>✍️ Signature Pad</h2>
<p class="sub">// sign with your finger · tap Send</p>

<div class="canvas-wrap" id="wrap">
  <canvas id="canvas"></canvas>
  <div class="sign-line"></div>
  <div class="sign-hint">Sign above the line</div>
</div>

<div class="btns">
  <button class="btn btn-clear" id="btnClear">Clear</button>
  <button class="btn btn-send"  id="btnSend" disabled>Send to Voucher</button>
</div>
<div class="status" id="status"></div>

<script>
var canvas  = document.getElementById('canvas');
var ctx     = canvas.getContext('2d');
var wrap    = document.getElementById('wrap');
var btnSend = document.getElementById('btnSend');
var btnClear= document.getElementById('btnClear');
var status  = document.getElementById('status');
var drawing = false;
var hasDrawn= false;

function resizeCanvas() {
  var w = wrap.clientWidth;
  var h = Math.round(w * 0.45);
  canvas.width  = w;
  canvas.height = h;
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e) {
  var r = canvas.getBoundingClientRect();
  var src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('mousedown',  function(e){ drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove',  function(e){ if(!drawing) return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasDrawn=true; btnSend.disabled=false; });
canvas.addEventListener('mouseup',    function()  { drawing=false; });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); drawing=true; var p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!drawing) return; var p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasDrawn=true; btnSend.disabled=false; }, {passive:false});
canvas.addEventListener('touchend',   function()  { drawing=false; });

btnClear.addEventListener('click', function() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hasDrawn = false;
  btnSend.disabled = true;
  status.textContent = '';
  status.className = 'status';
});

btnSend.addEventListener('click', async function() {
  if (!hasDrawn) return;
  btnSend.disabled = true;
  btnSend.textContent = 'Sending...';
  status.textContent  = '';
  try {
    var dataUrl = canvas.toDataURL('image/png');
    var res = await fetch('/submit-signature', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ signature: dataUrl })
    });
    var data = await res.json();
    if (data.ok) {
      status.textContent = '✅ Signature sent! Go to the voucher on PC.';
      status.className   = 'status ok';
      btnSend.textContent= 'Sent ✅';
    } else {
      throw new Error('Server error');
    }
  } catch(e) {
    status.textContent = '❌ Failed: ' + e.message;
    status.className   = 'status err';
    btnSend.disabled   = false;
    btnSend.textContent= 'Send to Voucher';
  }
});
</script>
</body>
</html>
